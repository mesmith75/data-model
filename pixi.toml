# Pixi workspace for data-model. The default environment builds the library
# standalone and runs its I/O round-trip tests; the lint environment provides
# the prek hook tools (see .pre-commit-config.yaml) reproducibly, including on
# NixOS. Downstream frameworks still build data-model as part of their own
# stacks.
[workspace]
name = "data-model"
description = "SHiP event data model"
channels = ["https://prefix.dev/ship", "conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]
requires-pixi = ">=0.68"

# Lets downstream dev environments (aegir, ...) consume data-model from
# source: `shipdatamodel = { path = "../data-model" }`. Mirrors
# ship-conda-recipes/recipes/shipdatamodel (the release recipe); keep the
# version and the host dependencies in lockstep with it.
[package]
name = "shipdatamodel"
version = "0.2.0"

[package.build]
backend = { name = "pixi-build-cmake", version = "0.*" }

[package.build.config]
extra-args = [
    "-DCMAKE_INSTALL_LIBDIR=lib",
    "-DBUILD_TESTING=OFF",
]

[package.host-dependencies]
root_base = "*"
root_cxx_standard = "==23"

[dependencies]
cxx-compiler = "*"
cmake = ">=3.21"
ninja = "*"
git = "*"
root = ">=6.40"
root_cxx_standard = "==23"
# Required by the SHiP::SHiPUnits target (find_package(mp-units CONFIG)).
mp-units = ">=2.5"

[tasks]
configure = "cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo"
build = { cmd = "cmake --build build -j", depends-on = ["configure"] }
test = { cmd = "ctest --test-dir build --output-on-failure", depends-on = ["build"] }

[feature.lint.dependencies]
prek = "*"
python = ">=3.11"
clang-format = "22.*"
codespell = "*"
reuse = "*"
cffconvert = "*"
commitizen = "*"

# Pinned via PyPI to match the previous hook revs exactly: conda-forge's cpplint
# is stuck at 1.6.0 (a different, stale fork). gersemi is standardised on 0.27.7
# (the version used by the other SHiP repos; data-model previously pinned 0.17.1).
[feature.lint.pypi-dependencies]
cpplint = "==2.0.2"
gersemi = "==0.27.7"

[feature.lint.tasks]
lint = "prek run --all-files"
# Install the git hooks and route them through `pixi run` so the conda-provided
# hook tools are on PATH at commit time (required on NixOS, where the tools are
# not runnable without pixi activation).
install-hooks = '''
prek install --hook-type pre-commit --hook-type commit-msg
hooks=$(git rev-parse --git-path hooks)
for h in pre-commit commit-msg; do
  sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/$h"
done
'''

[environments]
lint = { features = ["lint"] }
