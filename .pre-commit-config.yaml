# Run with prek (https://github.com/j178/prek), a drop-in pre-commit replacement.
# The hook tools are provided by the pixi `lint` environment (see pixi.toml), so
# versions are tracked in pixi.lock and the hooks run identically everywhere.
#
#   pixi run install-hooks   # one-off: install the git hooks
#   pixi run lint            # run all hooks on all files
repos:
  # prek runs these as native Rust builtins (no environment, fully portable).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Tools below come from the pixi `lint` environment via language: system.
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        language: system
        entry: clang-format -i
        types_or: [c++, c]
        exclude: LinkDef\.h

      - id: cpplint
        name: cpplint
        language: system
        entry: cpplint
        types: [c++]
        exclude: LinkDef\.h

      - id: codespell
        name: codespell
        language: system
        entry: codespell
        types: [text]
        exclude: ^pixi\.lock$

      - id: validate-cff
        name: validate CITATION.cff
        language: system
        entry: cffconvert --validate
        files: ^CITATION\.cff$
        pass_filenames: false

      - id: reuse
        name: reuse lint
        language: system
        entry: reuse lint
        pass_filenames: false
        always_run: true

      - id: gersemi
        name: gersemi
        language: system
        entry: gersemi -i
        files: (\.cmake|CMakeLists\.txt)$
